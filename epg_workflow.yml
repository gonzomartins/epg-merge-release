name: EPG Merge & GitHub Release Upload

on:
  schedule:
    - cron: '0 */6 * * *'   # 4x täglich: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg-merge-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Libraries installieren
        run: pip install requests lxml

      - name: EPG Download & Merge
        env:
          EPG_URL_1: ${{ secrets.EPG_URL_1 }}
          EPG_URL_2: ${{ secrets.EPG_URL_2 }}
        run: python epg_merge.py

      - name: Release sicherstellen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view epg-latest || gh release create epg-latest --title "EPG Latest" --notes "Automatisch aktualisiertes EPG"

      - name: Datei zum Release hochladen (überschreibt alte Version)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload epg-latest epg_merged.xml.gz --clobber
